<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Outfit:wght@100..900&family=Young+Serif&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
  <title>Frontend Mentor | Social links profile</title>

</head>

<body>

  <main>
    <div class="social-card">
      <img src="assets/images/avatar-jessica.jpeg" alt="Avatar of an African American woman"/>
      <h1 class="name-title">Jessica Randall</h1>
      <h2 class="location-text">London, United Kingdom</h2>
      <p class="description">"Front-end developer and avid reader."</p>
      <button class="social">GitHub</button>
      <button class="social">Frontend Mentor</button>
      <button class="social">LinkedIn</button>
      <button class="social">Twitter</button>
      <button class="social">Instagram</button>
    </div>
  </main>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
    Coded by <a href="https://www.linkedin.com/in/juan-jose-pineda-sanchez">Juan Pineda</a>.
  </footer>
</body>

</html>
